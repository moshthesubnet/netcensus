services:
  netcensus:
    image: ghcr.io/moshthesubnet/netcensus:latest
    build: .
    # host networking lets the container bind UDP 514 and receive syslog
    # directly on the host's IP without extra port-mapping complexity.
    network_mode: host
    restart: unless-stopped

    # NET_BIND_SERVICE: required to bind UDP port 514 (syslog) as non-root.
    # NET_RAW: only needed if NMAP_SUBNETS is configured for supplemental scanning.
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW

    env_file:
      - .env

    volumes:
      # Persist the SQLite database across container restarts
      - ./data:/app/data

    environment:
      DB_PATH: /app/data/network_monitor.db
